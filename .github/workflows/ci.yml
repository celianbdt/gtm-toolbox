# CI workflow — runs on every push and on PRs targeting master.
# Fails fast if the build or tests break, before Vercel ever attempts a deployment.

name: CI

on:
  push:
    branches: ["**"] # all branches
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - uses: actions/checkout@v4

      # 2. Set up Node.js 20 with npm cache for faster installs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Install dependencies (clean install, respects package-lock.json)
      - name: Install dependencies
        run: npm ci

      # 4. Build the Next.js app.
      #    NEXT_PUBLIC_* vars are inlined at build time — dummy values are
      #    sufficient here because the CI build only verifies compilation,
      #    it never connects to external services.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      # 5. Run the Vitest test suite
      - name: Test
        run: npm run test
